<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz — CodeCards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="dashboard.html" class="logo">&lt;CodeCards/&gt;</a>
      <nav>
        <button id="quit-btn" class="btn btn-ghost btn-sm">✕ Quit</button>
      </nav>
    </header>

    <main class="page-content quiz-page">
      <!-- Loading / Error state -->
      <div id="quiz-loading" class="quiz-state">
        <p class="loading-text">Loading quiz…</p>
      </div>
      <div id="quiz-error" class="alert alert-error hidden"></div>

      <!-- Progress bar -->
      <div id="quiz-progress-wrap" class="quiz-progress-wrap hidden">
        <div class="quiz-progress-meta">
          <span id="deck-name" class="deck-lang-badge"></span>
          <span id="progress-label" class="text-muted"></span>
        </div>
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- Flashcard -->
      <div id="flashcard-wrap" class="flashcard-wrap hidden">
        <div
          id="flashcard"
          class="flashcard"
          tabindex="0"
          role="button"
          aria-label="Click to flip card"
        >
          <div class="flashcard-inner">
            <div class="flashcard-front">
              <span class="card-face-label">Question</span>
              <div id="card-front-content" class="card-content"></div>
            </div>
            <div class="flashcard-back">
              <span class="card-face-label">Answer</span>
              <div id="card-back-content" class="card-content"></div>
            </div>
          </div>
        </div>
        <p id="flip-hint" class="flip-hint">
          Click the card or press Space to reveal the answer
        </p>

        <div id="verdict-btns" class="verdict-btns hidden">
          <button id="missed-btn" class="btn btn-danger btn-verdict">
            ✗ Missed it
          </button>
          <button id="got-it-btn" class="btn btn-success btn-verdict">
            ✓ Got it!
          </button>
        </div>
      </div>

      <!-- Results screen -->
      <div id="results-screen" class="results-screen hidden">
        <div class="results-card">
          <h2 id="results-title">Quiz Complete!</h2>
          <div id="results-score" class="results-score"></div>
          <div id="results-bar-wrap" class="results-bar-wrap">
            <div id="results-bar" class="results-bar"></div>
          </div>
          <p id="results-msg" class="results-msg"></p>
          <div class="results-actions">
            <button id="retry-btn" class="btn btn-primary">Retry</button>
            <a id="back-to-deck-btn" href="#" class="btn btn-ghost"
              >Back to Deck</a
            >
          </div>
        </div>
      </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/quiz.js"></script>
  </body>
</html>
